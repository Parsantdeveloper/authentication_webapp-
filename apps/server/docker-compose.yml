version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: auth_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: supersecret
      POSTGRES_DB: auth_db

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:
  postgres_data:
